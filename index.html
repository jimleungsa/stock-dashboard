<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📊 数据质量看板</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;background:#0f1923;color:#e0e6ed;min-height:100vh}
.header{background:linear-gradient(135deg,#1a2a3a,#0f1923);padding:12px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #2a3a4a}
.header h1{font-size:16px;font-weight:600}.header h1 span{color:#4fc3f7}
.header .meta{font-size:11px;color:#8899aa;display:flex;align-items:center;gap:8px}
.header .meta button{background:#1e88e5;color:#fff;border:none;padding:3px 10px;border-radius:4px;cursor:pointer;font-size:11px}

/* Running bar - fixed at top */
.running-bar{background:#1e88e522;border-bottom:1px solid #1e88e5;padding:8px 16px;display:none}
.running-bar.active{display:flex;align-items:center;gap:10px}
.running-bar .spinner{width:14px;height:14px;border:2px solid #4fc3f7;border-top-color:transparent;border-radius:50%;animation:spin .8s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.running-bar .text{flex:1;font-size:12px;color:#4fc3f7}
.running-bar .cancel{background:transparent;border:1px solid #4fc3f7;color:#4fc3f7;padding:2px 8px;border-radius:3px;cursor:pointer;font-size:11px}

/* Alerts */
.alerts{padding:8px 16px;display:flex;flex-direction:column;gap:4px}
.alert{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:6px;font-size:12px;animation:fadeIn .3s}
@keyframes fadeIn{from{opacity:0;transform:translateY(-3px)}to{opacity:1;transform:translateY(0)}}
.alert.error{background:#b71c1c18;border:1px solid #b71c1c44;color:#ff8a80}
.alert.warning{background:#f57f1718;border:1px solid #f57f1744;color:#fff59d}
.alert.info{background:#0277bd18;border:1px solid #0277bd44;color:#80d8ff}
.alert .icon{flex-shrink:0}
.alert .msg{flex:1;line-height:1.4}
.alert .fix-btn{background:transparent;border:1px solid currentColor;padding:2px 10px;border-radius:3px;cursor:pointer;font-size:11px;white-space:nowrap;transition:all .15s;flex-shrink:0}
.alert .fix-btn:hover{background:currentColor;color:#0f1923}
.alert .fix-btn:disabled{opacity:.3;cursor:not-allowed;text-decoration:line-through}

/* Cards */
.container{padding:12px 16px;display:grid;grid-template-columns:1fr 1fr;gap:12px}
.card{background:#1a2a3a;border-radius:8px;border:1px solid #2a3a4a;overflow:hidden}
.card-header{padding:8px 12px;border-bottom:1px solid #2a3a4a;display:flex;justify-content:space-between;align-items:center}
.card-header h2{font-size:13px;font-weight:500}
.badge{font-size:10px;padding:2px 8px;border-radius:10px}
.badge.ok{background:#2e7d3233;color:#81c784;border:1px solid #2e7d32}
.badge.warn{background:#f57f1733;color:#fff59d;border:1px solid #f57f17}
.badge.error{background:#b71c1c33;color:#ff8a80;border:1px solid #b71c1c}
.card-body{padding:10px 12px}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:10px}
.stat{text-align:center;padding:5px;background:#0f1923;border-radius:5px}
.stat .val{font-size:18px;font-weight:700}.stat .lbl{font-size:9px;color:#8899aa;margin-top:1px}
.val.blue{color:#4fc3f7}.val.green{color:#81c784}.val.red{color:#ff8a80}.val.yellow{color:#fff59d}
table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:9px;color:#8899aa;padding:3px 0;border-bottom:1px solid #2a3a4a}
td{padding:5px 0;font-size:10px;border-bottom:1px solid #1a2530}
.pct{font-weight:600}.pct.good{color:#81c784}.pct.warn{color:#fff59d}.pct.bad{color:#ff8a80}
.pbar{height:3px;background:#0f1923;border-radius:2px;overflow:hidden}
.pbar .fill{height:100%;border-radius:2px;transition:width .3s}.fill.green{background:#4caf50}.fill.yellow{background:#ffc107}.fill.red{background:#f44336}

/* Fix panel */
.fix-panel{grid-column:1/-1;background:#1a2a3a;border-radius:8px;border:1px solid #2a3a4a}
.fix-header{padding:8px 12px;border-bottom:1px solid #2a3a4a;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.fix-header h2{font-size:13px;font-weight:500}
.fix-body{padding:10px 12px;display:flex;gap:10px;flex-wrap:wrap}
.fix-body.hidden{display:none}
.fix-card{flex:1;min-width:200px;background:#0f1923;border-radius:6px;padding:10px;border:1px solid #2a3a4a}
.fix-card .title{font-size:12px;font-weight:600;margin-bottom:3px}
.fix-card .desc{font-size:10px;color:#8899aa;margin-bottom:8px;line-height:1.4}
.fix-card .status{font-size:10px;padding:4px 6px;border-radius:3px;margin-top:4px;display:none}
.fix-card .status.idle{display:block;color:#8899aa}
.fix-card .status.running{display:block;color:#4fc3f7;background:#1e88e515}
.fix-card .status.done{display:block;color:#81c784;background:#2e7d3215}
.fix-card .status.error{display:block;color:#ff8a80;background:#b71c1c15}
.fix-card .btn{background:#1e88e5;color:#fff;border:none;padding:4px 12px;border-radius:4px;font-size:11px;cursor:pointer;width:100%;transition:all .15s}
.fix-card .btn:hover{background:#1565c0}
.fix-card .btn:disabled{opacity:.4;cursor:not-allowed}
.fix-card .btn.busy{animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

/* Toast */
.toast{position:fixed;bottom:16px;right:16px;background:#1a2a3a;border-radius:6px;padding:8px 14px;font-size:11px;z-index:999;box-shadow:0 4px 16px rgba(0,0,0,.4);animation:slideUp .2s ease;max-width:360px}
@keyframes slideUp{from{transform:translateY(10px);opacity:0}to{transform:translateY(0);opacity:1}}
.toast.ok{border:1px solid #2e7d32;color:#81c784}
.toast.err{border:1px solid #b71c1c;color:#ff8a80}
.toast.info{border:1px solid #1e88e5;color:#4fc3f7}

/* Progress bar for running task */
.progress-track{height:4px;background:#0f1923;border-radius:2px;margin-top:6px;overflow:hidden;display:none}
.progress-track.active{display:block}
.progress-fill{height:100%;background:linear-gradient(90deg,#1e88e5,#4fc3f7);border-radius:2px;transition:width .5s}

@media(max-width:800px){.container{grid-template-columns:1fr}.stats{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="header">
  <h1>📊 <span>数据质量看板</span></h1>
  <div class="meta"><span id="ts">--</span><button onclick="load()">🔄 刷新</button></div>
</div>

<div id="runningBar" class="running-bar">
  <div class="spinner"></div>
  <span class="text" id="runningText">--</span>
</div>

<div id="alerts" class="alerts"></div>

<div class="container">
  <!-- Fix panel -->
  <div class="fix-panel">
    <div class="fix-header" onclick="toggleFixPanel()">
      <h2>🔧 修复操作</h2>
      <span id="fixArrow">▶</span>
    </div>
    <div class="fix-body" id="fixBody">
      <div class="fix-card" id="fix-hk-sync">
        <div class="title">🔄 港股同步</div>
        <div class="desc">用腾讯源补采今日缺失的港股日线，并自动补算指标</div>
        <button class="btn" onclick="runFix('hk-sync')">执行</button>
        <div class="status idle">等待执行</div>
        <div class="progress-track"><div class="progress-fill" style="width:0%"></div></div>
      </div>
      <div class="fix-card" id="fix-hk-indicators">
        <div class="title">📊 港股指标补算</div>
        <div class="desc">重新计算港股全部技术指标（MA/KDJ/MACD/BOLL）</div>
        <button class="btn" onclick="runFix('hk-indicators')">执行</button>
        <div class="status idle">等待执行</div>
        <div class="progress-track"><div class="progress-fill" style="width:0%"></div></div>
      </div>
      <div class="fix-card" id="fix-a-sync">
        <div class="title">🔄 A股同步</div>
        <div class="desc">执行盘后任务，同步A股日线并计算指标</div>
        <button class="btn" onclick="runFix('a-sync')">执行</button>
        <div class="status idle">等待执行</div>
        <div class="progress-track"><div class="progress-fill" style="width:0%"></div></div>
      </div>
      <div class="fix-card" id="fix-fix-all" style="border-color:#1e88e5">
        <div class="title">🚀 一键修复</div>
        <div class="desc">港股同步 → 指标补算 → A股同步，全自动执行</div>
        <button class="btn" onclick="runFix('fix-all')">执行</button>
        <div class="status idle">等待执行</div>
        <div class="progress-track"><div class="progress-fill" style="width:0%"></div></div>
      </div>
    </div>
  </div>

  <!-- A股 -->
  <div class="card">
    <div class="card-header"><h2>🇨🇳 A股</h2><span id="ab" class="badge ok">--</span></div>
    <div class="card-body">
      <div class="stats">
        <div class="stat"><div id="ad" class="val blue">--</div><div class="lbl">最新日期</div></div>
        <div class="stat"><div id="ac" class="val green">--</div><div class="lbl">数据量</div></div>
        <div class="stat"><div id="ap" class="val green">--</div><div class="lbl">覆盖率</div></div>
      </div>
      <table id="at"><tr><th>指标</th><th>覆盖</th><th>状态</th><th style="width:25%"></th></tr></table>
    </div>
  </div>

  <!-- 港股 -->
  <div class="card">
    <div class="card-header"><h2>🇭🇰 港股</h2><span id="hb" class="badge ok">--</span></div>
    <div class="card-body">
      <div class="stats">
        <div class="stat"><div id="hd" class="val blue">--</div><div class="lbl">最新日期</div></div>
        <div class="stat"><div id="hc" class="val green">--</div><div class="lbl">数据量</div></div>
        <div class="stat"><div id="hp" class="val green">--</div><div class="lbl">覆盖率</div></div>
      </div>
      <table id="ht"><tr><th>指标</th><th>覆盖</th><th>状态</th><th style="width:25%"></th></tr></table>
    </div>
  </div>

  <!-- A股趋势 -->
  <div class="card"><div class="card-header"><h2>📈 A股趋势</h2></div><div class="card-body"><canvas id="ac2" style="width:100%;height:120px"></canvas></div></div>
  <!-- 港股趋势 -->
  <div class="card"><div class="card-header"><h2>📈 港股趋势</h2></div><div class="card-body"><canvas id="hc2" style="width:100%;height:120px"></canvas></div></div>
</div>

<script>
const FIX_NAMES = {
  'hk-sync': '港股数据同步',
  'hk-indicators': '港股指标补算',
  'a-sync': 'A股数据同步',
  'fix-all': '一键修复',
};

let polling = null;
let fixPanelOpen = false;
let currentTask = null;

function toggleFixPanel() {
  fixPanelOpen = !fixPanelOpen;
  document.getElementById('fixBody').classList.toggle('hidden', !fixPanelOpen);
  document.getElementById('fixArrow').textContent = fixPanelOpen ? '▼' : '▶';
}

function toast(msg, type) {
  const t = document.createElement('div');
  t.className = 'toast ' + (type || 'info');
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 5000);
}

// 渲染告警
function renderAlerts(alerts) {
  const bar = document.getElementById('alerts');
  if (!alerts || alerts.length === 0) {
    bar.innerHTML = '<div class="alert info"><span class="icon">✅</span><span class="msg">所有数据正常</span></div>';
    return;
  }
  bar.innerHTML = alerts.map(a => {
    const icon = a.level === 'error' ? '🔴' : a.level === 'warning' ? '🟡' : '🔵';
    const fixClass = a.fix ? '' : ' style="display:none"';
    return `<div class="alert ${a.level}">
      <span class="icon">${icon}</span>
      <span class="msg">${a.message}</span>
      <button class="fix-btn"${fixClass} data-fix="${a.fix||''}" onclick="runFix('${a.fix}')">修复</button>
    </div>`;
  }).join('');
}

// 渲染数据卡片
function renderMarket(prefix, d) {
  if (!d || d.status === 'error') {
    document.getElementById(prefix+'d').textContent='N/A';
    document.getElementById(prefix+'c').textContent='--';
    document.getElementById(prefix+'p').textContent='--';
    const b=document.getElementById(prefix+'b'); b.textContent='异常'; b.className='badge error';
    return;
  }
  document.getElementById(prefix+'d').textContent=d.latest_date||'--';
  document.getElementById(prefix+'c').textContent=(d.latest_count||0).toLocaleString();
  const cp=d.coverage_pct||0;
  document.getElementById(prefix+'p').textContent=cp+'%';
  const b=document.getElementById(prefix+'b');
  b.textContent=cp>=95?'正常':cp>=80?'警告':'异常';
  b.className='badge '+(cp>=95?'ok':cp>=80?'warn':'error');

  const ti=document.getElementById(prefix==='a'?'at':'ht');
  // 清空旧行（保留表头）
  while(ti.rows.length>1) ti.deleteRow(-1);
  const ind=d.indicators||{};
  Object.keys(ind).forEach(n=>{
    const v=ind[n];
    const pct=v.pct||0;
    const barColor=pct>=95?'green':pct>=80?'yellow':'red';
    const pctColor=pct>=95?'good':pct>=80?'warn':'bad';
    const tr=ti.insertRow();
    tr.innerHTML=`<td>${n}</td><td>${v.ok}/${v.total}</td><td class="pct ${pctColor}">${pct}%</td>
      <td><div class="pbar"><div class="fill ${barColor}" style="width:${pct}%"></div></div></td>`;
  });
}

// 简易趋势图（用 Canvas 画柱状图，不依赖外部库）
function drawBarChart(canvasId, data, color) {
  const canvas = document.getElementById(canvasId);
  if (!canvas || !data.length) return;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  ctx.scale(dpr, dpr);

  const w = rect.width, h = rect.height;
  const padding = {top: 8, right: 8, bottom: 20, left: 36};
  const chartW = w - padding.left - padding.right;
  const chartH = h - padding.top - padding.bottom;

  ctx.clearRect(0, 0, w, h);

  const maxVal = Math.max(...data.map(d => d.count));
  const barW = Math.max(4, chartW / data.length - 2);

  // Y轴标签
  ctx.fillStyle = '#8899aa';
  ctx.font = '9px sans-serif';
  ctx.textAlign = 'right';
  ctx.fillText(maxVal.toLocaleString(), padding.left - 2, padding.top + 8);
  ctx.fillText(Math.round(maxVal/2).toLocaleString(), padding.left - 2, padding.top + chartH/2 + 4);
  ctx.fillText('0', padding.left - 2, h - padding.bottom + 3);

  // 柱状图
  data.forEach((d, i) => {
    const x = padding.left + (chartW / data.length) * i + (chartW / data.length - barW) / 2;
    const barH = (d.count / maxVal) * chartH;
    const y = padding.top + chartH - barH;

    ctx.fillStyle = color;
    ctx.fillRect(x, y, barW, barH);

    // X轴标签
    ctx.fillStyle = '#8899aa';
    ctx.textAlign = 'center';
    ctx.font = '8px sans-serif';
    ctx.fillText(d.date.slice(5), x + barW/2, h - padding.bottom + 12);
  });
}

// 运行修复
async function runFix(action) {
  const name = FIX_NAMES[action] || action;
  const btn = document.querySelector(`#fix-${action} .btn`);

  // 先尝试提交
  try {
    const resp = await fetch('/api/fix/' + action, { method: 'POST' });
    const result = await resp.json();

    if (result.status === 'rejected') {
      toast('⚠️ ' + result.message, 'err');
      return;
    }

    if (result.status === 'queued') {
      // 更新 UI
      if (btn) { btn.disabled = true; btn.textContent = '执行中...'; btn.classList.add('busy'); }
      currentTask = action;
      updateFixCard(action, 'running', '排队中...');
      showRunning(name, 0);
      toast('🚀 ' + name + ' 已提交', 'info');

      // 开始轮询进度
      startPolling(action);
    }
  } catch (e) {
    toast('❌ 请求失败: ' + e.message, 'err');
  }
}

// 轮询任务进度
function startPolling(taskId) {
  if (polling) clearInterval(polling);
  polling = setInterval(async () => {
    try {
      const resp = await fetch('/api/task/' + taskId);
      const t = await resp.json();

      if (!t || t.status === 'not_found') return;

      // 更新进度条
      updateFixCard(taskId, t.status, t.message, t.progress);
      showRunning(FIX_NAMES[taskId] || taskId, t.progress);

      if (t.status === 'done') {
        stopPolling();
        toast('✅ ' + (t.message || '完成'), 'ok');
        setTimeout(load, 1500); // 1.5秒后刷新数据
      } else if (t.status === 'error') {
        stopPolling();
        toast('❌ ' + (t.message || '失败'), 'err');
        // 恢复按钮
        const btn = document.querySelector(`#fix-${taskId} .btn`);
        if (btn) { btn.disabled = false; btn.textContent = '执行'; btn.classList.remove('busy'); }
      }
    } catch (e) {
      // 静默失败，继续轮询
    }
  }, 1000); // 每秒轮询一次
}

function stopPolling() {
  if (polling) { clearInterval(polling); polling = null; }
  currentTask = null;
  hideRunning();
}

function showRunning(name, progress) {
  const bar = document.getElementById('runningBar');
  const text = document.getElementById('runningText');
  bar.className = 'running-bar active';
  text.textContent = `${name} 执行中... ${progress}%`;
}

function hideRunning() {
  document.getElementById('runningBar').className = 'running-bar';
}

function updateFixCard(action, status, message, progress) {
  const card = document.getElementById('fix-' + action);
  if (!card) return;
  const statusEl = card.querySelector('.status');
  const track = card.querySelector('.progress-track');
  const fill = card.querySelector('.progress-fill');

  statusEl.className = 'status ' + status;
  statusEl.textContent = message;

  if (progress !== undefined) {
    track.classList.add('active');
    fill.style.width = Math.min(progress, 100) + '%';
  }

  if (status === 'running') {
    const btn = card.querySelector('.btn');
    if (btn) { btn.disabled = true; btn.textContent = '执行中...'; btn.classList.add('busy'); }
  } else if (status === 'done' || status === 'error') {
    const btn = card.querySelector('.btn');
    if (btn) { btn.disabled = false; btn.textContent = '执行'; btn.classList.remove('busy'); }
  }
}

// 加载数据
async function load() {
  try {
    const r = await fetch('/api/data?t=' + Date.now());
    const d = await r.json();
    document.getElementById('ts').textContent = '更新于 ' + d.timestamp;
    renderAlerts(d.alerts);
    renderMarket('a', d.a_share);
    renderMarket('h', d.hk);
    drawBarChart('ac2', d.a_share?.trend || [], '#4caf50');
    drawBarChart('hc2', d.hk?.trend || [], '#4fc3f7');

    // 同步任务状态到修复面板
    if (currentTask) {
      try {
        const resp = await fetch('/api/task/' + currentTask);
        const t = await resp.json();
        if (t && t.status !== 'pending') {
          updateFixCard(currentTask, t.status, t.message, t.progress);
        }
      } catch {}
    }
  } catch (e) {
    document.getElementById('ts').textContent = '加载失败: ' + e.message;
  }
}

// 初始加载
load();
// 每30秒自动刷新
setInterval(load, 30000);
</script>
</body>
</html>
